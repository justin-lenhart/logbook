<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Logbook{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --navy: #1a2744;
      --navy-light: #243560;
      --sky: #4a90d9;
    }
    body { background: #f4f6f9; }
    .navbar { background-color: var(--navy) !important; }
    .navbar-brand { color: #fff !important; font-weight: 700; letter-spacing: 0.03em; }
    .nav-link { color: rgba(255,255,255,0.85) !important; }
    .nav-link:hover, .nav-link.active { color: #fff !important; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.10); }
    .card-header-navy { background: var(--navy); color: #fff; border-radius: 0.375rem 0.375rem 0 0; }
    .btn-primary { background-color: var(--navy); border-color: var(--navy); }
    .btn-primary:hover { background-color: var(--navy-light); border-color: var(--navy-light); }
    .badge-sky { background-color: var(--sky); }
    #output-box {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      background: #0d1117;
      color: #c9d1d9;
      border-radius: 6px;
      padding: 1rem;
      white-space: pre-wrap;
      max-height: 480px;
      overflow-y: auto;
      display: none;
    }
    .spinner-wrap { display: none; }
    footer { font-size: 0.78rem; color: #888; margin-top: 3rem; text-align: center; padding-bottom: 1rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">&#9992;&#65039; Logbook</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% block nav_home %}{% endblock %}" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% block nav_import %}{% endblock %}" href="/import">Import</a></li>
        <li class="nav-item"><a class="nav-link {% block nav_map %}{% endblock %}" href="/map">Map</a></li>
        <li class="nav-item"><a class="nav-link {% block nav_config %}{% endblock %}" href="/config">Settings</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<footer>Logbook &mdash; running locally on this computer &mdash; your data stays private</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
